<!DOCTYPE html>
<html lang="en">
  <head>
    <title>cubelink - Secure Link Shortener</title>
    <link
      rel="stylesheet"
      href="https://{{ cdn }}/style.css"
    />
    <link
      rel="icon"
      type="image/png"
      href="https://{{ cdn }}/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://{{ cdn }}/favicon.svg"
    />
    <link
      rel="shortcut icon"
      href="https://{{ cdn }}/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://{{ cdn }}/apple-touch-icon.png"
    />
    <link
      rel="manifest"
      href="https://{{ cdn }}/site.webmanifest"
    />
    <meta id="errorreason" value="{{ errormessage }}" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body>
    <div id="notification" class="notification"></div>
    <form method="POST" autocomplete="off" class="form">
      <div class="control">
        <center>
          <h1>Shorten a link</h1>
        </center>
      </div>
      <div class="control block-cube block-input">
        <input
          name="link"
          id="link"
          placeholder="Paste a link here..."
          type="URL"
          required=""
        />
        <div class="bg-top">
          <div class="bg-inner"></div>
        </div>
        <div class="bg-right">
          <div class="bg-inner"></div>
        </div>
        <div class="bg">
          <div class="bg-inner"></div>
        </div>
      </div>
      <a id="custom-ext-toggle" class="custom-ext-toggle" href="#">
        <span>Custom URL (optional)</span>
        <span id="custom-ext-chevron" class="custom-ext-chevron">&#9660;</span>
      </a>
      <div id="custom-ext-wrap" class="custom-ext-wrap">
        <div class="control block-cube block-input">
          <div class="custom-ext-inner">
            <span class="custom-ext-tld">{{ tld }}/</span>
            <input
              name="custom_extension"
              id="custom_extension"
              placeholder="mylink"
              type="text"
              maxlength="30"
              pattern="[A-Za-z0-9]*"
              autocomplete="off"
            />
          </div>
          <div class="bg-top">
            <div class="bg-inner"></div>
          </div>
          <div class="bg-right">
            <div class="bg-inner"></div>
          </div>
          <div class="bg">
            <div class="bg-inner"></div>
          </div>
        </div>
      </div>
      <center>
      <div
        class="cf-turnstile"
        data-sitekey="0x4AAAAAAB4sJ2UCNZj4Zku8"
        data-theme="dark"
        data-size="normal"
        data-callback="onSuccess"
      ></div>
      </center>
      <br>
      <button class="btn block-cube block-cube-hover" type="submit">
        <div class="bg-top">
          <div class="bg-inner"></div>
        </div>
        <div class="bg-right">
          <div class="bg-inner"></div>
        </div>
        <div class="bg">
          <div class="bg-inner"></div>
        </div>
        <div class="text">Shorten it!</div>
      </button>
    </form>
    <div class="credits">
      <a
        href="https://github.com/jackseceng/LinkShort/tree/main"
        target="_blank"
      >
        Source code
      </a>
      |
      <a href="https://jacksec.engineer" target="_blank"> Made by Jack </a>
    </div>
    <script src="https://{{ cdn }}/main.js"></script>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>
  </body>
</html>
