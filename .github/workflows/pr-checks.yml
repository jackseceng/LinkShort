---
name: PR Checks

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read
  checks: read
  packages: write
  security-events: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  code:
    uses: ./.github/workflows/codeql.yml

  semgrep:
    uses: ./.github/workflows/semgrep.yml
    secrets: inherit

  container:
    uses: ./.github/workflows/container.yml
    secrets: inherit
