---
name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: docker.io
  REPOSITORY: jackseceng
  IMAGE_NAME: linkshort

jobs:
  semgrep:
    name: Analyze (semgrep)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      security-events: write
      actions: read
    container:
      image: semgrep/semgrep:1.161.0@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48 # v1.161.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: semgrep scan --config auto --sarif --output semgrep.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: semgrep.sarif
        if: always()

  codeql:
    name: Analyze (${{ matrix.language }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{matrix.language}}"

  container:
    name: Build and Push
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@722e97d12b1d06a961800dd6c05d79d951ad3c80 # v1.8.0
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2.2.0
        with:
          context: .
          push: true
          tags: ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.event_name == 'pull_request' && github.event.number || 'latest' }}
          platforms: linux/amd64
          provenance: true
          sbom: true

  container-scan:
    needs: [container]
    name: ${{ matrix.scanner.name }} Scan
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        scanner:
          - name: Grype
            id: grype
          - name: Trivy
            id: trivy
          - name: Scout
            id: scout
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Get image tag
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Login to Docker Hub
        if: matrix.scanner.id == 'scout'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Run Grype Scan
        if: matrix.scanner.id == 'grype'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.get_tag.outputs.tag }}
          fail-build: false
          severity-cutoff: medium
          only-fixed: true
          output-format: sarif
          output-file: results.sarif
      - name: Run Trivy Scan
        if: matrix.scanner.id == 'trivy'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.get_tag.outputs.tag }}
          scan-type: image
          ignore-unfixed: false
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: results.sarif
      - name: Run Scout Scan
        if: matrix.scanner.id == 'scout'
        uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1.20.4
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.get_tag.outputs.tag }}
          only-severities: critical,high,medium
          only-fixed: true
          sarif-file: results.sarif
          write-comment: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif

  results:
    name: Results
    needs: [semgrep, codeql, container-scan]
    if: github.event_name == 'pull_request' && always()
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      security-events: read
      pull-requests: write
      actions: read
      checks: read
    steps:
      - name: Fetch findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          declare -A tool_counts
          tools=("Grype" "Trivy" "Docker Scout" "Semgrep PRO" "CodeQL")
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          all_alerts="[]"
          page=1
          while true; do
            batch=$(gh api "repos/$REPO/code-scanning/alerts?pr=$PR&state=open&per_page=100&page=$page" 2>/dev/null || echo "[]")
            count=$(echo "$batch" | jq 'length')
            [[ "$count" -eq 0 ]] && break
            all_alerts=$(echo "$all_alerts $batch" | jq -s 'add')
            head_batch=$(echo "$batch" | jq --arg sha "$HEAD_SHA" '[.[] | select(.most_recent_instance.commit_sha == $sha)]')
            for tool in "${tools[@]}"; do
              n=$(echo "$head_batch" | jq --arg t "$tool" '[.[] | select(.tool.name | ascii_downcase | contains($t | ascii_downcase))] | length')
              tool_counts[$tool]=$(( ${tool_counts[$tool]:-0} + n ))
            done
            [[ "$count" -lt 100 ]] && break
            (( page++ )) || true
          done

          total=0
          for i in "${!tools[@]}"; do
            tool="${tools[$i]}"
            c=${tool_counts[$tool]:-0}
            total=$(( total + c ))
          done

          details=$(echo "$all_alerts" | jq -r '.[] | "| \(.most_recent_instance.location.path | ltrimstr("linkshort/") | gsub("//"; "/")):\(.most_recent_instance.location.start_line) | \(.rule.description) | \(.rule.security_severity_level // .rule.severity) | \(.tool.name) |"' | grep -v '^$' || true)

          severity_order=("critical" "high" "error" "medium" "warning" "low" "note")
          highest="none"
          while IFS= read -r sev; do
            for s in "${severity_order[@]}"; do
              if [[ "${sev,,}" == "$s" ]]; then
                for ranked in "${severity_order[@]}"; do
                  [[ "$ranked" == "$highest" ]] && break
                  [[ "$ranked" == "$s" ]] && highest="$s" && break
                done
                break
              fi
            done
          done < <(echo "$all_alerts" | jq -r '.[] | (.rule.security_severity_level // .rule.severity)')

          case "$highest" in
            critical) alert_type="CAUTION" ;;
            high|error) alert_type="WARNING" ;;
            medium) alert_type="IMPORTANT" ;;
            *) alert_type="NOTE" ;;
          esac

          sep=$'\n'
          header="## 🔒 Security Findings Summary"
          summary="> [!${alert_type}]${sep}> **$total** findings, some of which are **$highest** severity."
          findings_table="| File | Description | Severity | Tool |${sep}|------|-------------|----------|------|${sep}${details}"
          dropdown="<details><summary>View all findings</summary>${sep}${sep}${findings_table}${sep}${sep}</details>"
          footer="> Any findings must be fixed or justified, see [repository PR guidance](https://github.com/jackseceng/LinkShort?tab=contributing-ov-file#making-prs) for details."
          body="${header}${sep}${sep}${summary}${sep}${sep}${dropdown}${sep}${sep}${footer}"

          existing=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("## 🔒 Security Findings Summary")) | .id' | head -1 || true)
          [[ -n "$existing" ]] && gh api -X DELETE "repos/$REPO/issues/comments/$existing" || true

          if [[ "$total" -gt 0 ]]; then
            echo "$body" > /tmp/comment-body.md
            gh pr comment "$PR" --repo "$REPO" --body-file /tmp/comment-body.md || true
          fi

          if [[ "$total" -gt 0 ]]; then
            echo "::error::$total open security finding(s) found. Any findings must be fixed or justified, see repository PR guidance for details https://github.com/jackseceng/LinkShort?tab=contributing-ov-file#making-prs"
            exit 1
          fi
