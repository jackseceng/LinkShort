---
name: Security Summary

on:
  workflow_run:
    workflows: ["PR Checks"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-24.04
    permissions:
      security-events: read
      pull-requests: write
      actions: read
      checks: read

    steps:
      - name: Fetch findings and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.workflow_run.pull_requests[0].number }}
          REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          declare -A tool_counts
          tools=("Grype" "Trivy" "docker-scout" "Semgrep" "CodeQL")
          labels=("Grype" "Trivy" "Scout" "Semgrep" "CodeQL")

          page=1
          while true; do
            batch=$(gh api "repos/$REPO/code-scanning/alerts?ref=$REF&state=open&per_page=100&page=$page" 2>/dev/null || echo "[]")
            count=$(echo "$batch" | jq 'length')
            [[ "$count" -eq 0 ]] && break
            for tool in "${tools[@]}"; do
              n=$(echo "$batch" | jq --arg t "$tool" '[.[] | select(.tool.name | ascii_downcase | contains($t | ascii_downcase))] | length')
              tool_counts[$tool]=$(( ${tool_counts[$tool]:-0} + n ))
            done
            [[ "$count" -lt 100 ]] && break
            (( page++ ))
          done

          total=0
          rows=""
          for i in "${!tools[@]}"; do
            tool="${tools[$i]}"
            label="${labels[$i]}"
            c=${tool_counts[$tool]:-0}
            total=$(( total + c ))
            rows+="| $label | $c |"$'\n'
          done

          echo "=== Security Findings ==="
          for i in "${!tools[@]}"; do
            echo "${labels[$i]}: ${tool_counts[${tools[$i]}]:-0}"
          done
          echo "Total: $total"
          echo "========================="

          header="## 🔒 Security Findings Summary"
          sep=$'\n'
          table="| Tool | Open Findings |${sep}|------|--------------|${sep}${rows}| **Total** | **$total** |"
          footer="> View details in the [Security tab](https://github.com/jackseceng/LinkShort/security/code-scanning?query=is%3Aopen+pr%3A$PR+)."
          body="${header}${sep}${sep}${table}${sep}${sep}${footer}"

          existing=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("## 🔒 Security Findings Summary")) | .id' | head -1)
          [[ -n "$existing" ]] && gh api -X DELETE "repos/$REPO/issues/comments/$existing"

          gh pr comment "$PR" --repo "$REPO" --body "$body"
