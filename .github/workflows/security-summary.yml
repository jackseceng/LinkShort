---
name: Security Summary

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      security-events: read
      pull-requests: write
      actions: read
      checks: read

    steps:
      - name: Wait for security checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          checks=("Container" "Code")
          timeout=1800
          elapsed=0
          while true; do
            all_done=true
            for check in "${checks[@]}"; do
              statuses=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
                --jq "[.check_runs[] | select(.name | startswith(\"$check\") or contains(\"$check\"))] | map(.status) | unique | .[]" 2>/dev/null)
              for s in $statuses; do
                [[ "$s" != "completed" ]] && all_done=false && break 2
              done
            done
            $all_done && break
            [[ $elapsed -ge $timeout ]] && echo "Timed out waiting for checks" && exit 1
            sleep 30
            elapsed=$(( elapsed + 30 ))
          done

      - name: Fetch findings and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          REF: ${{ github.event.pull_request.head.ref }}
        run: |
          declare -A tool_counts
          tools=("Grype" "Trivy" "docker-scout" "Semgrep" "CodeQL")
          labels=("Grype" "Trivy" "Scout" "Semgrep" "CodeQL")

          page=1
          while true; do
            batch=$(gh api "repos/$REPO/code-scanning/alerts?ref=$REF&state=open&per_page=100&page=$page" 2>/dev/null || echo "[]")
            count=$(echo "$batch" | jq 'length')
            [[ "$count" -eq 0 ]] && break
            for tool in "${tools[@]}"; do
              n=$(echo "$batch" | jq --arg t "$tool" '[.[] | select(.tool.name | ascii_downcase | contains($t | ascii_downcase))] | length')
              tool_counts[$tool]=$(( ${tool_counts[$tool]:-0} + n ))
            done
            [[ "$count" -lt 100 ]] && break
            (( page++ ))
          done

          total=0
          rows=""
          for i in "${!tools[@]}"; do
            tool="${tools[$i]}"
            label="${labels[$i]}"
            c=${tool_counts[$tool]:-0}
            total=$(( total + c ))
            rows+="| $label | $c |"$'\n'
          done

          body="## 🔒 Security Findings Summary

| Tool | Open Findings |
|------|--------------|
${rows}| **Total** | **$total** |

> View details in the [Security tab](https://github.com/$REPO/security/code-scanning?q=is%3Aopen+pr%3A$PR)."

          existing=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("## 🔒 Security Findings Summary")) | .id' | head -1)
          [[ -n "$existing" ]] && gh api -X DELETE "repos/$REPO/issues/comments/$existing"

          gh pr comment "$PR" --repo "$REPO" --body "$body"
