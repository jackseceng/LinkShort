---
name: Security Summary

on:
  pull_request:
    branches: ["main"]
    types: [ready_for_review]

jobs:
  comment:
    runs-on: ubuntu-24.04
    permissions:
      security-events: read
      pull-requests: write
      actions: read
      checks: read

    steps:
      - name: Fetch findings and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          REF: ${{ github.event.pull_request.head.ref }}
        run: |
          declare -A tool_counts
          tools=("Grype" "Trivy" "docker-scout" "Semgrep" "CodeQL")
          labels=("Grype" "Trivy" "Scout" "Semgrep" "CodeQL")

          echo "=== Raw alerts (no ref filter) ==="
          gh api "repos/$REPO/code-scanning/alerts?state=open&per_page=10" 2>/dev/null | jq '[.[] | {tool: .tool.name, ref: .most_recent_instance.ref, state: .state}]'
          echo "==================================="

          echo "=== Querying ref: refs/heads/$REF ==="
          echo "=== Full first page response ==="
          gh api "repos/$REPO/code-scanning/alerts?ref=refs/heads/$REF&state=open&per_page=100&page=1" 2>&1 | jq '.'
          echo "================================"

          page=1
          while true; do
            batch=$(gh api "repos/$REPO/code-scanning/alerts?ref=refs/heads/$REF&state=open&per_page=100&page=$page" 2>&1 || echo "[]")
            echo "=== Page $page: $count alerts, batch sample ==="
            echo "$batch" | jq '[.[] | {tool: .tool.name, ref: .most_recent_instance.ref}] | .[0:3]' 2>/dev/null || echo "$batch"
            count=$(echo "$batch" | jq 'length')
            [[ "$count" -eq 0 ]] && break
            for tool in "${tools[@]}"; do
              n=$(echo "$batch" | jq --arg t "$tool" '[.[] | select(.tool.name | ascii_downcase | contains($t | ascii_downcase))] | length')
              tool_counts[$tool]=$(( ${tool_counts[$tool]:-0} + n ))
            done
            [[ "$count" -lt 100 ]] && break
            (( page++ ))
          done

          total=0
          rows=""
          for i in "${!tools[@]}"; do
            tool="${tools[$i]}"
            label="${labels[$i]}"
            c=${tool_counts[$tool]:-0}
            total=$(( total + c ))
            rows+="| $label | $c |"$'\n'
          done

          echo "=== Security Findings ==="
          for i in "${!tools[@]}"; do
            echo "${labels[$i]}: ${tool_counts[${tools[$i]}]:-0}"
          done
          echo "Total: $total"
          echo "========================="

          header="## 🔒 Security Findings Summary"
          sep=$'\n'
          table="| Tool | Open Findings |${sep}|------|--------------|${sep}${rows}| **Total** | **$total** |"
          footer="> View details in the [Security tab](https://github.com/jackseceng/LinkShort/security/code-scanning?query=is%3Aopen+pr%3A$PR+)."
          body="${header}${sep}${sep}${table}${sep}${sep}${footer}"

          existing=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("## 🔒 Security Findings Summary")) | .id' | head -1)
          [[ -n "$existing" ]] && gh api -X DELETE "repos/$REPO/issues/comments/$existing"

          gh pr comment "$PR" --repo "$REPO" --body "$body"
