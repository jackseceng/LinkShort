---
name: Security Summary

on:
  pull_request:
    branches: ["main"]
    types: [ready_for_review]

jobs:
  comment:
    runs-on: ubuntu-24.04
    permissions:
      security-events: read
      pull-requests: write
      actions: read
      checks: read

    steps:
      - name: Fetch findings and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          declare -A tool_counts
          tools=("Grype" "Trivy" "Docker Scout" "Semgrep PRO" "CodeQL")

          all_alerts="[]"
          page=1
          while true; do
            batch=$(gh api "repos/$REPO/code-scanning/alerts?pr=$PR&state=open&per_page=100&page=$page" 2>/dev/null || echo "[]")
            count=$(echo "$batch" | jq 'length')
            [[ "$count" -eq 0 ]] && break
            all_alerts=$(echo "$all_alerts $batch" | jq -s 'add')
            for tool in "${tools[@]}"; do
              n=$(echo "$batch" | jq --arg t "$tool" '[.[] | select(.tool.name | ascii_downcase | contains($t | ascii_downcase))] | length')
              tool_counts[$tool]=$(( ${tool_counts[$tool]:-0} + n ))
            done
            [[ "$count" -lt 100 ]] && break
            (( page++ ))
          done

          total=0
          for i in "${!tools[@]}"; do
            tool="${tools[$i]}"
            c=${tool_counts[$tool]:-0}
            total=$(( total + c ))
          done

          details=$(echo "$all_alerts" | jq -r '.[] | "| \(.most_recent_instance.location.path | ltrimstr("linkshort/") | gsub("//"; "/")):\(.most_recent_instance.location.start_line) | [\(.rule.id)](\(.html_url)) | \(.rule.description) | \(.rule.security_severity_level // .rule.severity) | \(.tool.name) |"' | grep -v '^$')

          severity_order=("critical" "high" "error" "medium" "warning" "low" "note")
          highest="none"
          while IFS= read -r sev; do
            for s in "${severity_order[@]}"; do
              if [[ "${sev,,}" == "$s" ]]; then
                for ranked in "${severity_order[@]}"; do
                  [[ "$ranked" == "$highest" ]] && break
                  [[ "$ranked" == "$s" ]] && highest="$s" && break
                done
                break
              fi
            done
          done < <(echo "$all_alerts" | jq -r '.[] | (.rule.security_severity_level // .rule.severity)')

          case "$highest" in
            critical) alert_type="CAUTION" ;;
            high|error) alert_type="WARNING" ;;
            medium) alert_type="IMPORTANT" ;;
            *) alert_type="NOTE" ;;
          esac

          sep=$'\n'
          header="## 🔒 Security Findings Summary"
          summary="> [!${alert_type}]${sep}> **Total findings:** $total | **Highest severity:** $highest"
          findings_table="| File | CVE / Rule | Description | Severity | Tool |${sep}|------|-----------|-------------|----------|------|${sep}${details}"
          dropdown="<details><summary>View all findings</summary>${sep}${sep}${findings_table}${sep}${sep}</details>"
          dropdown="<details><summary>View all findings</summary>${sep}${sep}${findings_table}${sep}${sep}</details>"
          footer="> Any findings must be fixed or justified, see [repository PR guidance](https://github.com/jackseceng/LinkShort?tab=contributing-ov-file#making-prs) for details."
          body="${header}${sep}${sep}${summary}${sep}${sep}${dropdown}${sep}${sep}${footer}"

          existing=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("## 🔒 Security Findings Summary")) | .id' | head -1)
          [[ -n "$existing" ]] && gh api -X DELETE "repos/$REPO/issues/comments/$existing"

          echo "$body" > /tmp/comment-body.md
          gh pr comment "$PR" --repo "$REPO" --body-file /tmp/comment-body.md

          [[ "$total" -gt 0 ]] && echo "::error::$total open security finding(s) found. Any findings must be fixed or justified, see repository PR guidance for details https://github.com/jackseceng/LinkShort?tab=contributing-ov-file#making-prs" && exit 1
