---
name: Security Summary

on:
  pull_request:
    branches: ["main"]
    types: [ready_for_review]

jobs:
  comment:
    runs-on: ubuntu-24.04
    permissions:
      security-events: read
      pull-requests: write
      actions: read
      checks: read

    steps:
      - name: Fetch findings and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          declare -A tool_counts
          tools=("Grype" "Trivy" "docker-scout" "Semgrep PRO" "CodeQL")
          labels=("Grype" "Trivy" "Scout" "Semgrep" "CodeQL")

          all_alerts="[]"
          page=1
          while true; do
            batch=$(gh api "repos/$REPO/code-scanning/alerts?pr=$PR&state=open&per_page=100&page=$page" 2>/dev/null || echo "[]")
            count=$(echo "$batch" | jq 'length')
            [[ "$count" -eq 0 ]] && break
            all_alerts=$(echo "$all_alerts $batch" | jq -s 'add')
            for tool in "${tools[@]}"; do
              n=$(echo "$batch" | jq --arg t "$tool" '[.[] | select(.tool.name | ascii_downcase | contains($t | ascii_downcase))] | length')
              tool_counts[$tool]=$(( ${tool_counts[$tool]:-0} + n ))
            done
            [[ "$count" -lt 100 ]] && break
            (( page++ ))
          done

          total=0
          rows=""
          for i in "${!tools[@]}"; do
            tool="${tools[$i]}"
            label="${labels[$i]}"
            c=${tool_counts[$tool]:-0}
            total=$(( total + c ))
            rows+="| $label | $c |"$'\n'
          done

          details=$(echo "$all_alerts" | jq -r '.[] | "| \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line) | \(.tool.name) | \(.rule.severity) | \(.most_recent_instance.message.text | .[0:150]) |"')

          sep=$'\n'
          header="## 🔒 Security Findings Summary"
          table="| Tool | Open Findings |${sep}|------|--------------|${sep}${rows}| **Total** | **$total** |"
          findings_table="| File | Tool | Severity | Description |${sep}|------|------|----------|-------------|${sep}${details}"
          dropdown="<details><summary>View all findings</summary>${sep}${sep}${findings_table}${sep}${sep}</details>"
          footer="> View details in the [Security tab](https://github.com/jackseceng/LinkShort/security/code-scanning?query=is%3Aopen+pr%3A$PR+)."
          body="${header}${sep}${sep}${table}${sep}${sep}${dropdown}${sep}${sep}${footer}"

          existing=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("## 🔒 Security Findings Summary")) | .id' | head -1)
          [[ -n "$existing" ]] && gh api -X DELETE "repos/$REPO/issues/comments/$existing"

          echo "$body" > /tmp/comment-body.md
          gh pr comment "$PR" --repo "$REPO" --body-file /tmp/comment-body.md
